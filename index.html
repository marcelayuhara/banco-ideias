<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Banco de Ideias" />
  <meta name="theme-color" content="#0d1f0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Banco de Ideias</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      background: #edf2ed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #3d6b3d !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #a0c4a0; border-radius: 4px; }
    input, textarea, select, button { font-size: 16px; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(192,90,90,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(192,90,90,0); }
      100% { box-shadow: 0 0 0 0 rgba(192,90,90,0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: fadeIn 0.2s ease-out; }
    @supports(padding: env(safe-area-inset-bottom)) {
      .app-container { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
      .app-header { padding-top: calc(28px + env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const STAGES = {
      bruta:    { label: "Bruta",    color: "#6b9e6b", bg: "#f0f5f0", dot: "#6b9e6b" },
      refinada: { label: "Refinada", color: "#3d6b3d", bg: "#e6f0e6", dot: "#3d6b3d" },
      pronta:   { label: "Pronta",   color: "#1a3a1a", bg: "#dce8dc", dot: "#1a3a1a" },
    };

    const FORMATS = ["Reel", "Carrossel", "Story", "Post estático", "Outro"];
    const PILLARS = ["Método", "Marcela Empresária", "Prova Social", "ICP Mirror"];
    const emptyForm = { title: "", notes: "", stage: "bruta", format: "", pillar: "" };

    function todayLabel() {
      return new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
    }

    function parseIdeasFromText(raw) {
      const lines = raw
        .split(/\n{2,}|\n(?=\d+[\.\)\-])|(?<=\n)[-•*]\s/g)
        .map(l => l.replace(/^[\d\.\)\-•*\s]+/, "").trim())
        .filter(l => l.length > 3);
      return lines;
    }

    /* ── IdeaCard ── */
    function IdeaCard({ idea, onStageChange, onDelete, onSelect, selected }) {
      const stage = STAGES[idea.stage];
      return (
        <div className="card-enter" onClick={() => onSelect(idea)} style={{
          background: selected ? "#e8f0e8" : "#f7faf7",
          border: `1.5px solid ${selected ? "#3d6b3d" : "#d0e0d0"}`,
          borderRadius: 14, padding: "18px 20px", cursor: "pointer",
          transition: "all 0.18s ease",
          boxShadow: selected ? "0 4px 20px rgba(30,70,30,0.10)" : "0 1px 4px rgba(0,0,0,0.04)",
          WebkitTapHighlightColor: "transparent",
        }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                <span style={{
                  background: stage.bg, color: stage.color, border: `1px solid ${stage.dot}30`,
                  borderRadius: 20, fontSize: 11, fontWeight: 600, padding: "2px 10px",
                  letterSpacing: "0.04em", textTransform: "uppercase",
                }}>{stage.label}</span>
                {idea.format && <span style={{ color: "#4a7c4a", fontSize: 11, fontWeight: 500 }}>{idea.format}</span>}
                {idea.pillar && <span style={{ color: "#7aa87a", fontSize: 11 }}>· {idea.pillar}</span>}
                {idea.source === "audio"  && <span title="Gravado por áudio"  style={{ fontSize: 13 }}>🎙</span>}
                {idea.source === "upload" && <span title="Importado de arquivo" style={{ fontSize: 13 }}>📄</span>}
              </div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, color: "#0d1f0d", lineHeight: 1.35, marginBottom: 4, wordBreak: "break-word" }}>
                {idea.title || <span style={{ color: "#8ab08a", fontStyle: "italic" }}>Sem título</span>}
              </div>
              {idea.notes && <div style={{ fontSize: 12.5, color: "#3d6b3d", lineHeight: 1.5, marginTop: 4, wordBreak: "break-word" }}>{idea.notes}</div>}
              <div style={{ fontSize: 11, color: "#8ab08a", marginTop: 8 }}>{idea.date}</div>
            </div>
            <button onClick={e => { e.stopPropagation(); if (confirm("Excluir essa ideia?")) onDelete(idea.id); }}
              style={{ background: "none", border: "none", cursor: "pointer", color: "#a0c4a0", fontSize: 18, padding: 4, lineHeight: 1, flexShrink: 0, minWidth: 28, minHeight: 28, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 12 }} onClick={e => e.stopPropagation()}>
            {Object.entries(STAGES).map(([key, s]) => (
              <button key={key} onClick={() => onStageChange(idea.id, key)} style={{
                background: idea.stage === key ? s.bg : "transparent",
                border: `1px solid ${idea.stage === key ? s.dot : "#c8dcc8"}`,
                color: idea.stage === key ? s.color : "#8ab08a",
                borderRadius: 20, fontSize: 10.5, padding: "4px 12px", cursor: "pointer",
                fontWeight: idea.stage === key ? 700 : 400, transition: "all 0.15s", fontFamily: "inherit",
                minHeight: 28,
              }}>{s.label}</button>
            ))}
          </div>
        </div>
      );
    }

    /* ── AudioRecorder ── */
    function AudioRecorder({ onTranscript }) {
      const [listening, setListening] = useState(false);
      const [interim, setInterim] = useState("");
      const [error, setError] = useState("");
      const supported = typeof window !== "undefined" && ("webkitSpeechRecognition" in window || "SpeechRecognition" in window);
      const recRef = useRef(null);

      const stop = useCallback(() => {
        if (recRef.current) {
          try { recRef.current.stop(); } catch (e) {}
          recRef.current = null;
        }
        setListening(false);
        setInterim("");
      }, []);

      const start = useCallback(() => {
        setError("");
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SR();
        rec.lang = "pt-BR";
        rec.continuous = false;
        rec.interimResults = true;
        rec.maxAlternatives = 1;

        rec.onstart = () => {
          setListening(true);
        };

        rec.onresult = e => {
          let fin = "", int = "";
          for (let i = 0; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
              fin += t;
            } else {
              int += t;
            }
          }
          if (fin) {
            onTranscript(fin.trim());
            setInterim("");
          } else {
            setInterim(int);
          }
        };

        rec.onerror = (e) => {
          console.error("Speech error:", e.error);
          if (e.error === "not-allowed") {
            setError("Permissão de microfone negada. Verifique as configurações do navegador.");
          } else if (e.error === "no-speech") {
            setError("Nenhuma fala detectada. Tente novamente.");
          } else {
            setError("Erro ao gravar. Tente novamente.");
          }
          stop();
        };

        rec.onend = () => {
          setListening(false);
          setInterim("");
          recRef.current = null;
        };

        try {
          rec.start();
          recRef.current = rec;
        } catch (e) {
          setError("Não foi possível iniciar a gravação.");
        }
      }, [onTranscript, stop]);

      const toggle = () => {
        if (listening) {
          stop();
        } else {
          start();
        }
      };

      useEffect(() => {
        return () => { stop(); };
      }, [stop]);

      if (!supported) return (
        <div style={{ fontSize: 13, color: "#3d6b3d", padding: "12px 14px", background: "#f0f5f0", borderRadius: 10, marginBottom: 12, lineHeight: 1.5 }}>
          Reconhecimento de voz não disponível neste navegador. Use <strong>Chrome</strong> ou <strong>Safari</strong> para gravar áudio.
        </div>
      );

      return (
        <div style={{ marginBottom: 12 }}>
          <button onClick={toggle} style={{
            display: "flex", alignItems: "center", gap: 10, width: "100%",
            background: listening ? "#fde8e8" : "#f0f5f0",
            border: `1.5px solid ${listening ? "#c05a5a" : "#d0e0d0"}`,
            borderRadius: 10, padding: "14px 16px", cursor: "pointer",
            fontSize: 14, fontWeight: 500, color: listening ? "#a03030" : "#3d6b3d",
            fontFamily: "inherit", transition: "all 0.2s",
            minHeight: 48, WebkitTapHighlightColor: "transparent",
          }}>
            <span style={{
              width: 12, height: 12, borderRadius: "50%",
              background: listening ? "#c05a5a" : "#6b9e6b", flexShrink: 0,
              animation: listening ? "pulse 1.2s infinite" : "none",
            }} />
            {listening ? "Gravando... toque para parar" : "Toque para gravar"}
          </button>
          {interim && (
            <div style={{ marginTop: 8, padding: "10px 14px", background: "#f0f5f0", border: "1px solid #d0e0d0", borderRadius: 8, fontSize: 13, color: "#3d6b3d", fontStyle: "italic", lineHeight: 1.5 }}>
              {interim}
            </div>
          )}
          {error && (
            <div style={{ marginTop: 8, padding: "10px 14px", background: "#fef5f5", border: "1px solid #f0d0d0", borderRadius: 8, fontSize: 13, color: "#a03030", lineHeight: 1.5 }}>
              {error}
            </div>
          )}
        </div>
      );
    }

    /* ── FileUploader ── */
    function FileUploader({ onIdeas }) {
      const [dragging, setDragging] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [preview, setPreview] = useState(null);
      const [selected, setSelected] = useState([]);
      const inputRef = useRef(null);

      const readFile = async (file) => {
        setProcessing(true);
        try {
          const text = await file.text();
          const lines = parseIdeasFromText(text);
          if (lines.length === 0) {
            alert("Nenhuma ideia encontrada no arquivo.");
          } else {
            setPreview({ lines, fileName: file.name });
            setSelected(lines.map((_, i) => i));
          }
        } catch (e) { alert("Não foi possível ler o arquivo. Tente .txt ou .md."); }
        setProcessing(false);
      };

      const handleDrop = e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) readFile(f); };
      const handleChange = e => { const f = e.target.files[0]; if (f) readFile(f); };
      const toggleLine = i => setSelected(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]);

      const confirmImport = () => {
        onIdeas(preview.lines.filter((_, i) => selected.includes(i)));
        setPreview(null); setSelected([]);
      };

      if (preview) return (
        <div style={{ background: "#f0f5f0", border: "1.5px solid #6b9e6b", borderRadius: 12, padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#0d1f0d" }}>
              {preview.fileName} — {preview.lines.length} ideia{preview.lines.length !== 1 ? "s" : ""} detectada{preview.lines.length !== 1 ? "s" : ""}
            </div>
            <button onClick={() => setPreview(null)} style={{ background: "none", border: "none", color: "#8ab08a", fontSize: 16, cursor: "pointer", minWidth: 28, minHeight: 28 }}>×</button>
          </div>
          <div style={{ maxHeight: 200, overflowY: "auto", marginBottom: 12, display: "flex", flexDirection: "column", gap: 6 }}>
            {preview.lines.map((line, i) => (
              <label key={i} style={{
                display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer",
                padding: "8px 10px", borderRadius: 8,
                background: selected.includes(i) ? "#e6f0e6" : "transparent",
                border: `1px solid ${selected.includes(i) ? "#a0c4a0" : "transparent"}`,
                transition: "all 0.15s",
              }}>
                <input type="checkbox" checked={selected.includes(i)} onChange={() => toggleLine(i)}
                  style={{ marginTop: 2, accentColor: "#3d6b3d", flexShrink: 0, width: 18, height: 18 }} />
                <span style={{ fontSize: 13, color: "#0d1f0d", lineHeight: 1.45 }}>{line}</span>
              </label>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setSelected(preview.lines.map((_, i) => i))}
              style={{ fontSize: 12, color: "#3d6b3d", background: "none", border: "1px solid #a0c4a0", borderRadius: 20, padding: "6px 14px", cursor: "pointer", fontFamily: "inherit", minHeight: 32 }}>
              Todas
            </button>
            <button onClick={() => setSelected([])}
              style={{ fontSize: 12, color: "#3d6b3d", background: "none", border: "1px solid #a0c4a0", borderRadius: 20, padding: "6px 14px", cursor: "pointer", fontFamily: "inherit", minHeight: 32 }}>
              Nenhuma
            </button>
            <button onClick={confirmImport} disabled={!selected.length} style={{
              flex: 1, background: selected.length ? "#1a3a1a" : "#c8dcc8",
              color: selected.length ? "#f0f5f0" : "#5a8a5a",
              border: "none", borderRadius: 10, padding: "10px", fontSize: 13, fontWeight: 600,
              cursor: selected.length ? "pointer" : "default", fontFamily: "inherit", transition: "all 0.2s",
              minHeight: 40,
            }}>
              Importar {selected.length} ideia{selected.length !== 1 ? "s" : ""}
            </button>
          </div>
        </div>
      );

      return (
        <div
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={handleDrop}
          onClick={() => inputRef.current?.click()}
          style={{
            border: `1.5px dashed ${dragging ? "#3d6b3d" : "#a0c4a0"}`,
            borderRadius: 10, padding: "24px 16px",
            background: dragging ? "#e6f0e6" : "#f0f5f0",
            cursor: "pointer", textAlign: "center", transition: "all 0.2s",
            WebkitTapHighlightColor: "transparent",
          }}
        >
          <input ref={inputRef} type="file" accept=".txt,.md,.text" onChange={handleChange} style={{ display: "none" }} />
          {processing
            ? <div style={{ fontSize: 13, color: "#3d6b3d" }}>Processando...</div>
            : <>
                <div style={{ fontSize: 22, marginBottom: 6, color: "#3d6b3d" }}>+</div>
                <div style={{ fontSize: 13, color: "#3d6b3d", fontWeight: 500 }}>Solte seu arquivo de notas aqui</div>
                <div style={{ fontSize: 11.5, color: "#8ab08a", marginTop: 4 }}>ou toque para selecionar · .txt ou .md</div>
              </>
          }
        </div>
      );
    }

    /* ── AddForm ── */
    function AddForm({ onSave, onClose }) {
      const [form, setForm] = useState(emptyForm);
      const [tab, setTab] = useState("texto");

      const handleTranscript = t => {
        setForm(f => ({
          ...f,
          title: f.title ? f.title : t.slice(0, 80),
          notes: f.title ? (f.notes ? f.notes + " " + t : t) : (t.length > 80 ? t : ""),
        }));
      };

      const handleImportedIdeas = lines => {
        lines.forEach(line => onSave({ ...emptyForm, title: line.slice(0, 100), notes: line.length > 100 ? line : "", source: "upload" }));
        onClose();
      };

      const save = () => { if (!form.title.trim()) return; onSave({ ...form, source: tab === "audio" ? "audio" : "manual" }); onClose(); };

      const tabStyle = t => ({
        flex: 1, padding: "10px 0", fontSize: 13, fontWeight: tab === t ? 600 : 400,
        color: tab === t ? "#0d1f0d" : "#5a8a5a",
        background: "none", border: "none",
        borderBottom: `2px solid ${tab === t ? "#3d6b3d" : "transparent"}`,
        cursor: "pointer", transition: "all 0.15s", fontFamily: "inherit",
        minHeight: 40,
      });

      return (
        <div className="card-enter" style={{
          background: "#f7faf7", border: "1.5px solid #6b9e6b", borderRadius: 16,
          padding: "20px", marginBottom: 20, boxShadow: "0 4px 24px rgba(30,70,30,0.08)",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, color: "#0d1f0d" }}>Nova ideia</div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#8ab08a", fontSize: 18, cursor: "pointer", minWidth: 28, minHeight: 28 }}>×</button>
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", borderBottom: "1px solid #d0e0d0", marginBottom: 16 }}>
            <button style={tabStyle("texto")}   onClick={() => setTab("texto")}>Texto</button>
            <button style={tabStyle("audio")}   onClick={() => setTab("audio")}>Áudio</button>
            <button style={tabStyle("arquivo")} onClick={() => setTab("arquivo")}>Arquivo</button>
          </div>

          {tab === "arquivo" && <FileUploader onIdeas={handleImportedIdeas} />}

          {tab === "audio" && (
            <>
              <AudioRecorder onTranscript={handleTranscript} />
              {form.title && (
                <div style={{ marginBottom: 12, padding: "12px 14px", background: "#e6f0e6", borderRadius: 8, fontSize: 13, color: "#0d1f0d", lineHeight: 1.5 }}>
                  <strong style={{ fontSize: 11, color: "#3d6b3d", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Transcrição capturada</strong>
                  {form.title}{form.notes ? ` — ${form.notes}` : ""}
                </div>
              )}
            </>
          )}

          {/* Campos comuns (texto + audio) */}
          {tab !== "arquivo" && (
            <>
              <input
                autoFocus={tab === "texto"}
                placeholder={tab === "audio" ? "Ou escreva o título aqui..." : "Qual é a ideia?"}
                value={form.title}
                onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
                onKeyDown={e => e.key === "Enter" && save()}
                style={{
                  width: "100%", background: "#f0f5f0", border: "1.5px solid #d0e0d0",
                  borderRadius: 10, padding: "12px 14px", fontSize: 16, color: "#0d1f0d",
                  marginBottom: 10, fontFamily: "inherit",
                }}
              />
              <textarea
                placeholder="Contexto, referência, insight extra... (opcional)"
                value={form.notes}
                onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
                rows={2}
                style={{
                  width: "100%", background: "#f0f5f0", border: "1.5px solid #d0e0d0",
                  borderRadius: 10, padding: "12px 14px", fontSize: 16, color: "#2d5a2d",
                  marginBottom: 10, resize: "none", fontFamily: "inherit", lineHeight: 1.5,
                }}
              />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                <select value={form.format} onChange={e => setForm(f => ({ ...f, format: e.target.value }))} style={{
                  background: "#f0f5f0", border: "1.5px solid #d0e0d0", borderRadius: 10,
                  padding: "10px 12px", fontSize: 16, color: form.format ? "#0d1f0d" : "#5a8a5a",
                  fontFamily: "inherit", cursor: "pointer", minHeight: 44,
                }}>
                  <option value="">Formato</option>
                  {FORMATS.map(f => <option key={f} value={f}>{f}</option>)}
                </select>
                <select value={form.pillar} onChange={e => setForm(f => ({ ...f, pillar: e.target.value }))} style={{
                  background: "#f0f5f0", border: "1.5px solid #d0e0d0", borderRadius: 10,
                  padding: "10px 12px", fontSize: 16, color: form.pillar ? "#0d1f0d" : "#5a8a5a",
                  fontFamily: "inherit", cursor: "pointer", minHeight: 44,
                }}>
                  <option value="">Pilar</option>
                  {PILLARS.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {Object.entries(STAGES).map(([key, s]) => (
                  <button key={key} onClick={() => setForm(f => ({ ...f, stage: key }))} style={{
                    flex: 1, background: form.stage === key ? s.bg : "transparent",
                    border: `1.5px solid ${form.stage === key ? s.dot : "#c8dcc8"}`,
                    color: form.stage === key ? s.color : "#8ab08a",
                    borderRadius: 10, padding: "10px 0", fontSize: 12,
                    fontWeight: form.stage === key ? 700 : 400, cursor: "pointer",
                    transition: "all 0.15s", fontFamily: "inherit", minHeight: 40,
                  }}>{s.label}</button>
                ))}
              </div>
              <button onClick={save} disabled={!form.title.trim()} style={{
                width: "100%", background: form.title.trim() ? "#1a3a1a" : "#c8dcc8",
                color: form.title.trim() ? "#f0f5f0" : "#5a8a5a",
                border: "none", borderRadius: 10, padding: "14px", fontSize: 15,
                fontWeight: 600, cursor: form.title.trim() ? "pointer" : "default",
                transition: "all 0.2s", fontFamily: "inherit", minHeight: 48,
              }}>Salvar ideia</button>
            </>
          )}
        </div>
      );
    }

    /* ── Main ── */
    function BancoIdeias() {
      const [ideas, setIdeas]   = useState([]);
      const [adding, setAdding] = useState(false);
      const [filter, setFilter] = useState("todas");
      const [selected, setSelected] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [search, setSearch] = useState("");

      useEffect(() => {
        try {
          const saved = localStorage.getItem("marcela-ideias");
          if (saved) setIdeas(JSON.parse(saved));
        } catch (e) {}
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        try { localStorage.setItem("marcela-ideias", JSON.stringify(ideas)); } catch (e) {}
      }, [ideas, loaded]);

      const addIdea = form => setIdeas(prev => [{ ...form, id: Date.now().toString() + Math.random().toString(36).slice(2), date: todayLabel() }, ...prev]);
      const deleteIdea = id => { setIdeas(p => p.filter(i => i.id !== id)); if (selected?.id === id) setSelected(null); };
      const changeStage = (id, stage) => { setIdeas(p => p.map(i => i.id === id ? { ...i, stage } : i)); if (selected?.id === id) setSelected(s => ({ ...s, stage })); };

      const counts = { todas: ideas.length, bruta: 0, refinada: 0, pronta: 0 };
      ideas.forEach(i => counts[i.stage]++);

      const filtered = ideas.filter(i =>
        (filter === "todas" || i.stage === filter) &&
        (!search || i.title.toLowerCase().includes(search.toLowerCase()) || i.notes?.toLowerCase().includes(search.toLowerCase()))
      );

      return (
        <div className="app-container" style={{ fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif", background: "#edf2ed", minHeight: "100vh", paddingBottom: 60 }}>
          {/* Header */}
          <div className="app-header" style={{ background: "#0d1f0d", padding: "28px 24px 22px", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ color: "#6b9e6b", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 500, marginBottom: 4 }}>@marcelalamastra</div>
                <div style={{ color: "#f0f5f0", fontFamily: "'DM Sans', sans-serif", fontSize: 22, fontWeight: 700 }}>Banco de Ideias</div>
              </div>
              <button onClick={() => { setAdding(v => !v); setSelected(null); }} style={{
                background: adding ? "#3d6b3d" : "#6b9e6b", color: adding ? "#f0f5f0" : "#0d1f0d",
                border: "none", borderRadius: 30, padding: "10px 20px",
                fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
                minHeight: 42, WebkitTapHighlightColor: "transparent",
              }}>{adding ? "Fechar" : "+ Ideia"}</button>
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 18, flexWrap: "wrap" }}>
              {[["todas","Todas"],["bruta","Bruta"],["refinada","Refinada"],["pronta","Pronta"]].map(([key, label]) => (
                <button key={key} onClick={() => setFilter(key)} style={{
                  background: filter === key ? "#6b9e6b" : "transparent",
                  color: filter === key ? "#0d1f0d" : "#4a7c4a",
                  border: `1px solid ${filter === key ? "#6b9e6b" : "#2d5a2d"}`,
                  borderRadius: 20, padding: "6px 14px", fontSize: 12,
                  fontWeight: filter === key ? 600 : 400, cursor: "pointer",
                  transition: "all 0.15s", fontFamily: "inherit",
                  minHeight: 32, WebkitTapHighlightColor: "transparent",
                }}>{label} <span style={{ opacity: 0.7 }}>({counts[key]})</span></button>
              ))}
            </div>
          </div>

          <div style={{ padding: "20px 20px 0", maxWidth: 640, margin: "0 auto" }}>
            <input type="text" placeholder="Buscar ideia..." value={search} onChange={e => setSearch(e.target.value)} style={{
              width: "100%", background: "#f7faf7", border: "1.5px solid #d0e0d0",
              borderRadius: 10, padding: "12px 16px", fontSize: 16, color: "#0d1f0d",
              marginBottom: 16, fontFamily: "inherit",
            }} />

            {adding && <AddForm onSave={addIdea} onClose={() => setAdding(false)} />}

            {selected && !adding && (
              <div className="card-enter" style={{
                background: "#f7faf7", border: "1.5px solid #3d6b3d", borderRadius: 16,
                padding: "20px", marginBottom: 20, boxShadow: "0 4px 24px rgba(30,70,30,0.10)",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 700, color: "#0d1f0d", flex: 1, wordBreak: "break-word" }}>{selected.title}</div>
                  <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#8ab08a", fontSize: 18, cursor: "pointer", padding: 0, minWidth: 28, minHeight: 28 }}>×</button>
                </div>
                {selected.notes && <p style={{ fontSize: 13.5, color: "#2d5a2d", lineHeight: 1.6, marginTop: 10, wordBreak: "break-word" }}>{selected.notes}</p>}
                <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
                  {selected.format && <span style={{ background: "#e0f0e0", color: "#3d6b3d", borderRadius: 20, fontSize: 11.5, padding: "3px 12px", border: "1px solid #b8d4b8" }}>{selected.format}</span>}
                  {selected.pillar && <span style={{ background: "#e0f0e0", color: "#3d6b3d", borderRadius: 20, fontSize: 11.5, padding: "3px 12px", border: "1px solid #b8d4b8" }}>{selected.pillar}</span>}
                  <span style={{ background: STAGES[selected.stage].bg, color: STAGES[selected.stage].color, borderRadius: 20, fontSize: 11.5, padding: "3px 12px", border: `1px solid ${STAGES[selected.stage].dot}30` }}>{STAGES[selected.stage].label}</span>
                </div>
                <div style={{ marginTop: 16, padding: "14px", background: "#f0f5f0", borderRadius: 10, fontSize: 13, color: "#3d6b3d", lineHeight: 1.5 }}>
                  <strong>Próximo passo:</strong> Cole essa ideia numa nova conversa e peça para criar o roteiro, expandir a pauta ou encaixar na grade de conteúdo.
                </div>
              </div>
            )}

            {!loaded ? (
              <div style={{ textAlign: "center", color: "#8ab08a", padding: 40 }}>Carregando...</div>
            ) : filtered.length === 0 ? (
              <div style={{ textAlign: "center", color: "#8ab08a", padding: 48 }}>
                <div style={{ fontSize: 32, marginBottom: 12, color: "#6b9e6b" }}>+</div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, color: "#3d6b3d", fontWeight: 500 }}>
                  {ideas.length === 0 ? "Nenhuma ideia ainda" : "Nenhuma ideia nesse filtro"}
                </div>
                <div style={{ fontSize: 13, marginTop: 6 }}>{ideas.length === 0 ? "Clique em + Ideia para começar" : "Tente outro estágio"}</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {filtered.map(idea => (
                  <IdeaCard key={idea.id} idea={idea} onStageChange={changeStage} onDelete={deleteIdea} onSelect={setSelected} selected={selected?.id === idea.id} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BancoIdeias />);
  </script>
</body>
</html>
